<style>

        }

            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .mask-fade-bottom {
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);

<p class="text-label-md font-label-md text-on-surface-variant">Curated matching for the discerning.</p>

</div>
</div>

<script>
        // Page entry animations
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('header-logo').classList.remove('opacity-0', 'translate-y-[-20px]');
            }, 300);

            setTimeout(() => {
                document.getElementById('hero-card').classList.remove('opacity-0', 'scale-95');
            }, 600);

            setTimeout(() => {
                document.getElementById('action-cluster').classList.remove('opacity-0', 'translate-y-[30px]');
            }, 900);
        });

        // Micro-interaction for social buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
