<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .reason-chip input:checked + label {

            border-color: #ffb2b9;
            color: #ffb2b9;
        }
        .safe-area-inset-bottom {
            padding-bottom: env(safe-area-inset-bottom);

    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="min-h-screen flex flex-col">
<!-- Top AppBar (Report User) -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-margin-mobile h-16">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/20 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary tracking-tight">Report User</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 overflow-y-auto px-margin-mobile pt-4 pb-32">
<!-- Profile Preview Section -->
<div class="flex items-center gap-md p-md bg-surface-container rounded-xl mb-lg border border-outline-variant/10">
<div class="w-16 h-16 rounded-full overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="A portrait of a person for a dating app profile. The lighting is moody and cinematic with soft pink and deep grey tones. The subject is looking away from the camera with a neutral expression. The style is modern, professional, and elegant, consistent with a high-end social networking application design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqCtE6HO8gTtnl1KgXDo40lZvkMavGZaVnl6hWgeP0Jqi1PL1RirIiOXeDKJ9SRyaySDqUbZafO3YJrOfWWta_9SQ7FBlZZV8ojP1bXtBHcMHw1iR3YxKRGQN0M5IRjuH3qZUJtX1g5f0Ry9kpj7gTrJDaYTK4tYFVgaYA7TL5M17uSkOlXFin6f97U7p7c1azWfNdl0RwS6e-sFJIntBFOqpEUdXBQ0d00FivhzcK2JzYTdDwkmyv57TTYGtKjHJgH-EXEhJekzY"/>
</div>
<div>
<h2 class="font-title-lg text-title-lg text-on-surface">Marcus, 28</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Profile active since Oct 2023</p>
</div>
</div>
<!-- Section: Reason -->
<section class="mb-xl">
<h3 class="font-label-md text-label-md uppercase tracking-wider text-on-surface-variant mb-md">Why are you reporting?</h3>
<div class="flex flex-col gap-sm">
<div class="reason-chip">
<input class="hidden" id="fake" name="report_reason" type="radio"/>
<label class="flex items-center justify-between p-md border border-outline-variant rounded-xl cursor-pointer transition-all hover:bg-surface-variant/10" for="fake">
<span class="font-body-lg text-body-lg">Fake Profile / Scammer</span>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</label>
</div>
<div class="reason-chip">
<input class="hidden" id="behavior" name="report_reason" type="radio"/>
<label class="flex items-center justify-between p-md border border-outline-variant rounded-xl cursor-pointer transition-all hover:bg-surface-variant/10" for="behavior">
<span class="font-body-lg text-body-lg">Inappropriate Behavior</span>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</label>
</div>
<div class="reason-chip">
<input class="hidden" id="harassment" name="report_reason" type="radio"/>
<label class="flex items-center justify-between p-md border border-outline-variant rounded-xl cursor-pointer transition-all hover:bg-surface-variant/10" for="harassment">
<span class="font-body-lg text-body-lg">Harassment</span>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</label>
</div>
<div class="reason-chip">
<input class="hidden" id="spam" name="report_reason" type="radio"/>
<label class="flex items-center justify-between p-md border border-outline-variant rounded-xl cursor-pointer transition-all hover:bg-surface-variant/10" for="spam">
<span class="font-body-lg text-body-lg">Spam / Advertising</span>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</label>
</div>
<div class="reason-chip">
<input class="hidden" id="underage" name="report_reason" type="radio"/>
<label class="flex items-center justify-between p-md border border-outline-variant rounded-xl cursor-pointer transition-all hover:bg-surface-variant/10" for="underage">
<span class="font-body-lg text-body-lg">Underage User</span>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</label>
</div>
</div>
</section>
<!-- Section: Additional Details -->
<section class="mb-xl">
<div class="flex justify-between items-center mb-md">
<h3 class="font-label-md text-label-md uppercase tracking-wider text-on-surface-variant">Additional Details</h3>
<span class="text-[10px] text-outline">OPTIONAL</span>
</div>
<textarea class="w-full h-32 bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-xl p-md font-body-md text-on-surface placeholder:text-on-surface-variant/40 resize-none transition-all" placeholder="Please describe what happened in more detail..."></textarea>
<p class="font-body-md text-[12px] text-on-surface-variant/60 mt-sm leading-snug">
                Your safety is our priority. This information is confidential and will be used by our safety team to review this profile.
            </p>
</section>
</main>
<!-- Bottom Actions Container -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container/95 backdrop-blur-md p-md safe-area-inset-bottom flex flex-col gap-sm border-t border-outline-variant/10">
<!-- Primary Action -->
<button class="w-full h-14 bg-primary-container text-on-primary-container font-title-lg text-title-lg rounded-full flex items-center justify-center gap-base active:scale-95 transition-transform shadow-lg shadow-primary-container/10">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">report</span>
            Report and Block
        </button>
<!-- Secondary Action -->
<button class="w-full h-12 bg-transparent text-primary font-body-lg text-body-lg rounded-full border border-primary/30 flex items-center justify-center hover:bg-primary/5 active:scale-95 transition-all">
            Block Only
        </button>
</footer>
<!-- Micro-interaction script -->
<script>
        // Simple visual feedback for radio selection
        document.querySelectorAll('input[name="report_reason"]').forEach(input => {
            input.addEventListener('change', () => {
                // Clear all indicators
                document.querySelectorAll('.reason-chip label span:last-child').forEach(span => {
                    span.innerText = 'chevron_right';
                    span.classList.remove('text-primary');
                });
                
                // Set active indicator
                if(input.checked) {
                    const icon = input.nextElementSibling.querySelector('span:last-child');
                    icon.innerText = 'check_circle';
                    icon.classList.add('text-primary');
                }
            });
        });
    </script>
</body></html>
